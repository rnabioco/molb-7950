[workspace]
name = "molb-7950"
description = "Informatics and Statistics for Molecular Biology"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-arm64"]

[tasks]
install-pak-deps = "Rscript scripts/install-pak-deps.R"
render = "quarto render"
preview = "quarto preview"
check-env = "Rscript scripts/check-env.R"

[dependencies]
# R and Quarto
r-base = ">=4.5"
quarto = ">=1.6"

# CLI bioinformatics tools
bedtools = "*"
ucsc-bedgraphtobigwig = "*"
ucsc-bedclip = "*"
wget = "*"

# for fallback installations of non-conda packages
r-remotes = "*"
r-biocmanager = "*"

# --- tidyverse & core data science ---
r-tidyverse = "*"
r-broom = "*"
r-conflicted = "*"
r-glue = "*"
r-here = "*"
r-fs = "*"
r-janitor = "*"
r-jsonlite = "*"
r-knitr = "*"
r-magrittr = "*"
r-purrr = "*"
r-readr = "*"
r-stringr = "*"
r-yaml = "*"
r-dplyr = "*"
r-ggplot2 = "*"
r-rstatix = "*"
r-scales = "*"
r-matrixstats = "*"
r-matrix = "*"
r-igraph = "*"

# --- visualization ---
r-cowplot = "*"
r-patchwork = "*"
r-ggpubr = "*"
r-ggrepel = "*"
r-ggridges = "*"
r-ggtext = "*"
r-ggforce = "*"
r-ggseqlogo = "*"
r-pheatmap = "*"
r-gt = "*"
r-diagrammer = "*"
r-rcolorbrewer = "*"
r-viridis = "*"
r-viridislite = "*"
r-ragg = "*"
r-jpeg = "*"
r-hmisc = "*"
r-msigdbr = "*"

# --- Bioconductor core ---
bioconductor-deseq2 = "*"
bioconductor-genomicranges = "*"
bioconductor-biostrings = "*"
bioconductor-bsgenome = "*"
bioconductor-rtracklayer = "*"
bioconductor-rsamtools = "*"
bioconductor-genomicalignments = "*"
bioconductor-genomicfeatures = "*"
bioconductor-annotationdbi = "*"
bioconductor-annotationhub = "*"
bioconductor-summarizedexperiment = "*"
bioconductor-complexheatmap = "*"
bioconductor-tximport = "*"
bioconductor-fgsea = "*"
bioconductor-clusterprofiler = "*"
bioconductor-enrichplot = "*"
bioconductor-dose = "*"
bioconductor-gosemsim = "*"
bioconductor-variantannotation = "*"
bioconductor-biocgenerics = "*"
bioconductor-biocparallel = "*"
bioconductor-iranges = "*"
bioconductor-s4vectors = "*"
bioconductor-genomeinfodb = "*"

# --- Bioconductor visualization & analysis ---
bioconductor-gviz = "*"
bioconductor-biovizbase = "*"
bioconductor-annotatr = "*"
bioconductor-biomart = "*"
bioconductor-ensembldb = "*"
# bioconductor-memes — solver conflict, use pak
# bioconductor-universalmotif — no osx-arm64 build, use pak
bioconductor-regioner = "*"
bioconductor-geneoverlap = "*"
bioconductor-ggtree = "*"
bioconductor-treeio = "*"

# --- Bioconductor annotation/data packages ---
"bioconductor-bsgenome.hsapiens.ucsc.hg19" = "*"
"bioconductor-bsgenome.scerevisiae.ucsc.saccer3" = "*"
"bioconductor-txdb.hsapiens.ucsc.hg19.knowngene" = "*"
"bioconductor-txdb.scerevisiae.ucsc.saccer3.sgdgene" = "*"
"bioconductor-org.hs.eg.db" = "*"
"bioconductor-go.db" = "*"

# --- Single-cell ---
bioconductor-singlecellexperiment = "*"
# bioconductor-scran — solver conflict with r-base, use pak
bioconductor-scater = "*"
# bioconductor-dropletutils — no osx-arm64 build, use pak
bioconductor-bluster = "*"

# --- other CRAN ---
r-downlit = "*"
r-fontawesome = "*"
r-gert = "*"
r-googlesheets4 = "*"
r-palmerpenguins = "*"
r-tidytree = "*"
r-showtext = "*"
r-emojifont = "*"
r-reactable = "*"
r-usethis = "*"

# Platform-specific: packages available on linux-64 but not osx-arm64
[target.linux-64.dependencies]
bioconductor-dropletutils = "*"
# bioconductor-universalmotif also available on linux but solver issues
# bioconductor-scran also available on linux but solver issues
